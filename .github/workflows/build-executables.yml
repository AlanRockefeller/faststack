name: Build Executables

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            python_architecture: x64
            artifact: windows-x64
          - os: macos-15-intel
            python_architecture: x64
            artifact: macos-x64
          - os: macos-15
            python_architecture: arm64
            artifact: macos-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python_architecture }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[bundle]" ruff

      - name: Run Ruff
        run: python -m ruff check faststack/

      - name: Build executable
        run: python -m PyInstaller packaging/faststack.spec --noconfirm --clean

      - name: Ad-hoc sign macOS app
        if: runner.os == 'macOS'
        run: codesign --force --deep --sign - dist/FastStack.app

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Compress-Archive -Path dist\FastStack -DestinationPath artifacts\FastStack-${{ matrix.artifact }}.zip -Force

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent dist/FastStack.app artifacts/FastStack-${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: FastStack-${{ matrix.artifact }}
          path: artifacts/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download build artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-artifacts
          gh run download "${{ github.run_id }}" --dir release-artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -t assets < <(find release-artifacts -type f -name 'FastStack-*.zip' | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            find release-artifacts -maxdepth 4 -type f -print >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" \
              --verify-tag \
              --title "FastStack $TAG_NAME" \
              --notes "Automated FastStack executable build for $TAG_NAME."
          fi
